appId: com.daffo.upapp
name: Auth User - Login Flow
---
# ============================================
# AUTHENTICATED USER - LOGIN ONLY
# (More features to be added)
# ============================================

# Setup and Login
- runFlow: auth-login.yaml

- assertVisible: "Upp"
- assertNotVisible: "Login"

# Verify routes load
- extendedWaitUntil:
    visible: ".*[0-9]+/[0-9]+/[0-9]+.*"
    timeout: 15000

# ============================================
# CREATE A NEW ROUTE
# ============================================

# Tap + to create route
- tapOn: "+"

# Should be on Create Route screen
- assertVisible: "Create Route"

# Fill in title
- tapOn: "Title"
- inputText: "E2E Test Route"

# Fill in grade
- tapOn: "Grade"
- inputText: "V3"

# Hide keyboard and scroll to the image preview
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "open-hold-editor"
    direction: DOWN
    timeout: 5000

# Tap on the image to open hold editor
- tapOn:
    id: "open-hold-editor"
- extendedWaitUntil:
    visible: "Done"
    timeout: 5000

# Tap on a hold in the image (center area where holds likely exist)
- tapOn:
    point: "50%,50%"

# If "No Hold" alert appears, dismiss and retry at a different point
- runFlow:
    when:
      visible: "No Hold"
    commands:
      - tapOn: "OK"
      - tapOn:
          point: "35%,48%"

- runFlow:
    when:
      visible: "No Hold"
    commands:
      - tapOn: "OK"
      - tapOn:
          point: "60%,49%"

# Switch to Feet mode and add a foot hold
- tapOn:
    text: "Hands.*"
- assertVisible:
    text: "Feet.*"

# Tap on a hold to add as foot hold (try different points)
- tapOn:
    point: "45%,55%"

- runFlow:
    when:
      visible: "No Hold"
    commands:
      - tapOn: "OK"
      - tapOn:
          point: "55%,45%"

- runFlow:
    when:
      visible: "No Hold"
    commands:
      - tapOn: "OK"
      - tapOn:
          point: "40%,52%"

# Switch back to Hands mode to verify toggle works
- tapOn:
    text: "Feet.*"
- assertVisible:
    text: "Hands.*"

# Tap Done to close editor
- tapOn: "Done"

# Verify we're back on create screen with at least 1 hold
- assertVisible:
    text: "Route Preview.*holds.*"

# Verify Feet section is visible in the form
- scrollUntilVisible:
    element:
      text: "Feet:"
    direction: DOWN
    timeout: 5000
- assertVisible: "Feet:"

# Wait for UI to settle after modal close
- waitForAnimationToEnd

# Save as draft (tap at bottom where button is, not header)
- tapOn: "Save Draft"

# Handle success alert
- extendedWaitUntil:
    visible: "Success"
    timeout: 10000
- tapOn: "OK"

# Should navigate to route detail
- extendedWaitUntil:
    visible: "Route Details"
    timeout: 10000

# Verify our route details
- assertVisible: "E2E Test Route"
- assertVisible: "V3"

# ============================================
# VERIFY DRAFT STATE
# ============================================

# Draft banner should be visible
- assertVisible:
    text: ".*draft.*"

# Publish button should be visible
- assertVisible: "Publish"

# Send button should NOT be visible (draft routes have no sends)
- assertNotVisible: ".*Send"

# Comments section should NOT be visible
- assertNotVisible: "Add a comment.*"

# Share button should NOT be visible
- assertNotVisible: "Share"

# ============================================
# PUBLISH THE ROUTE
# ============================================

# Tap publish on the draft banner
- tapOn: "Publish"

# Handle success alert
- extendedWaitUntil:
    visible: "Success"
    timeout: 10000
- tapOn: "OK"

# Draft banner should be gone
- assertNotVisible: "Publish"

# Send button should now be visible
- assertVisible: ".*Send"

# ============================================
# ADD A COMMENT
# ============================================

# Scroll to comments section
- scrollUntilVisible:
    element:
      text: "Add a comment.*"
    direction: DOWN
    timeout: 5000

# Type a comment
- tapOn: "Add a comment.*"
- inputText: "E2E test comment"

# Tap send button
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          point: "90%, 95%"
- runFlow:
    when:
      platform: iOS
    commands:
      - hideKeyboard
      - scrollUntilVisible:
          element:
            text: "E2E test comment"
          direction: DOWN
          timeout: 5000
      - tapOn:
          point: "92%, 92%"

# Wait for comment to appear and verify Anonymous name
- extendedWaitUntil:
    visible: "E2E test comment"
    timeout: 5000
- assertVisible: "Anonymous"

# ============================================
# DELETE THE COMMENT
# ============================================

# Tap delete button on the comment
- tapOn: "Delete comment"

# Verify the comment is gone
- extendedWaitUntil:
    notVisible: "E2E test comment"
    timeout: 5000

# Re-add the comment (needed for later sections)
- tapOn: "Add a comment.*"
- inputText: "E2E test comment"
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          point: "90%, 95%"
- runFlow:
    when:
      platform: iOS
    commands:
      - hideKeyboard
      - scrollUntilVisible:
          element:
            text: "E2E test comment"
          direction: DOWN
          timeout: 5000
      - tapOn:
          point: "92%, 92%"
- extendedWaitUntil:
    visible: "E2E test comment"
    timeout: 5000

# ============================================
# LOG A SEND
# ============================================

# Tap Send button (in header)
- tapOn: ".*Send"

# Wait for send modal
- extendedWaitUntil:
    visible: "Log Send"
    timeout: 5000

# Tap 5th star for quality rating
- tapOn: "5 star"

# Select "Accurate" for difficulty
- tapOn: "Accurate"

# Submit the send (tap button at bottom, not title)
- tapOn:
    point: "50%,92%"

# Wait for modal to close and verify send was logged
- waitForAnimationToEnd
- assertVisible: ".*Sent"

# Scroll to Rating row and tap to see sends list
- scrollUntilVisible:
    element:
      text: "Rating.*"
    direction: DOWN
    timeout: 5000
- tapOn: "Rating.*"

# Wait for sends screen and check Anonymous is shown
- extendedWaitUntil:
    visible: "Sends"
    timeout: 5000
- assertVisible: "Anonymous"

# Go back to route detail
- runFlow: shared/press-back.yaml

# ============================================
# EDIT THE SEND
# ============================================

# Tap Sent button to reopen modal (now shows Edit Send)
- tapOn: ".*Sent"
- extendedWaitUntil:
    visible: "Edit Send"
    timeout: 5000

# Change rating to 3 stars
- tapOn: "3 star"

# Change difficulty to Soft
- tapOn: "Soft"

# Tap Update button
- tapOn: "Update"
- waitForAnimationToEnd

# Verify still shows Sent
- assertVisible: ".*Sent"

# ============================================
# REMOVE THE SEND
# ============================================

# Tap Sent button again
- tapOn: ".*Sent"
- extendedWaitUntil:
    visible: "Edit Send"
    timeout: 5000

# Tap Remove Send
- tapOn: "Remove Send"
- waitForAnimationToEnd

# Button should revert (no longer shows "Sent")
- assertNotVisible: ".*Sent"

# ============================================
# RE-LOG THE SEND (needed for later sections)
# ============================================

# Tap Send button to log fresh send
- tapOn: ".*Send"
- extendedWaitUntil:
    visible: "Log Send"
    timeout: 5000

# Tap 5th star
- tapOn: "5 star"

# Select Accurate
- tapOn: "Accurate"

# Submit
- tapOn:
    point: "50%,92%"
- waitForAnimationToEnd
- assertVisible: ".*Sent"

# ============================================
# EDIT THE ROUTE
# ============================================

# Scroll to Edit Route
- scrollUntilVisible:
    element:
      text: "Edit Route.*"
    direction: DOWN
    timeout: 5000

# Tap Edit Route
- tapOn: "Edit Route.*"

# Wait for edit screen
- extendedWaitUntil:
    visible: "Edit Route"
    timeout: 5000

# Change the title
- tapOn: "Title"
- eraseText: 20
- inputText: "E2E Test Route Updated"

# Add description
- tapOn: "Description"
- inputText: "Updated via E2E test"

# Hide keyboard and save
- hideKeyboard

# Tap Save Changes button
- tapOn: "Save Changes"

# Handle success alert
- extendedWaitUntil:
    visible: "Success"
    timeout: 10000
- tapOn: "OK"

# Verify we're back on route detail with updated info
- assertVisible: ".*E2E Test Route Updated.*"

# ============================================
# BACK TO MAIN ROUTE LIST
# ============================================

- runFlow: shared/press-back.yaml

# Verify we're on home screen
- assertVisible: "Upp"
- assertVisible: "Spray Wall Routes"

# ============================================
# SET DISPLAY NAME IN MY ACCOUNT
# ============================================

# Wait for navigation to settle after swipe back
- waitForAnimationToEnd

# Open profile menu and tap Settings
- runFlow: shared/menu-tap-settings.yaml
- extendedWaitUntil:
    visible: "Display Name"
    timeout: 5000

# Verify language options are visible
- assertVisible: "Language"
- assertVisible:
    text: ".*English.*"
- assertVisible:
    text: ".*Italiano.*"

# Enter display name — tap placeholder to target the TextInput, not the label
- tapOn:
    text: "Enter your display name"
    optional: true
- runFlow:
    when:
      notVisible: "Enter your display name"
    commands:
      - tapOn: "Display Name"
- eraseText: 50
- inputText: "E2E Tester"
- hideKeyboard

# Save
- tapOn: "Save"
- extendedWaitUntil:
    visible: "Success"
    timeout: 5000
- tapOn: "OK"

# Verify version is displayed
- scrollUntilVisible:
    element: "Version ${APP_VERSION}"
    direction: DOWN
    speed: 40
    timeout: 5000
- assertVisible: "Version ${APP_VERSION}"

# Go back to home
- runFlow: shared/press-back.yaml

# ============================================
# CHECK MY COMMENTS
# ============================================

# Open profile menu
- runFlow: shared/menu-tap-my-comments.yaml
- extendedWaitUntil:
    visible: ".*E2E test comment.*"
    timeout: 5000

# Tap comment to go to route
- tapOn: ".*E2E test comment.*"
- extendedWaitUntil:
    visible: "Route Details"
    timeout: 5000
- assertVisible: ".*E2E Test Route Updated.*"

# Go back twice (to My Comments, then to Home)
- runFlow: shared/press-back.yaml
- runFlow: shared/press-back.yaml

# ============================================
# CHECK MY SENDS
# ============================================

# Open profile menu
- runFlow: shared/menu-tap-my-sends.yaml
- extendedWaitUntil:
    visible: ".*E2E Test Route Updated.*"
    timeout: 5000

# Tap send to go to route
- tapOn: ".*E2E Test Route Updated.*"
- extendedWaitUntil:
    visible: "Route Details"
    timeout: 5000

# Scroll down to see comment with new display name
- scrollUntilVisible:
    element:
      text: ".*E2E test comment.*"
    direction: DOWN
    timeout: 5000

# Verify display name changed from Anonymous to E2E Tester
- assertVisible: ".*E2E Tester.*"
- assertVisible: ".*E2E test comment.*"

# Tap username to see user's sends
- tapOn: ".*E2E Tester.*"
- extendedWaitUntil:
    visible: ".*E2E Test Route Updated.*"
    timeout: 5000

# Go back to home (User Profile → Route Details → My Sends → Home)
- runFlow: shared/press-back.yaml
- runFlow: shared/press-back.yaml
- runFlow: shared/press-back.yaml
- assertVisible: "Upp"

# ============================================
# CLEAR DISPLAY NAME
# ============================================

# Open profile menu
- runFlow: shared/menu-tap-settings.yaml
- extendedWaitUntil:
    visible: "Display Name"
    timeout: 5000

# Clear display name — tap the input value directly
- tapOn: "E2E Tester"
- eraseText: 20
- hideKeyboard

# Save
- tapOn: "Save"
- extendedWaitUntil:
    visible: "Success"
    timeout: 5000
- tapOn: "OK"

# Verify name was cleared — placeholder should be back
- assertVisible: "Enter your display name"

# ============================================
# TEST DELETE ACCOUNT (double confirmation)
# ============================================

# Scroll to Delete Account button
- scrollUntilVisible:
    element: "Delete Account"
    direction: DOWN
    timeout: 5000

# Tap Delete Account — first confirmation alert
- tapOn: "Delete Account"
- extendedWaitUntil:
    visible: "Delete Account?"
    timeout: 3000

# Cancel the first confirmation
- tapOn: "Cancel"

# Tap again — this time go through first confirmation
- tapOn: "Delete Account"
- extendedWaitUntil:
    visible: "Delete Account?"
    timeout: 3000
- tapOn: "Delete"

# Second confirmation should appear
- extendedWaitUntil:
    visible: "Are you absolutely sure?"
    timeout: 3000

# Cancel the second confirmation — do NOT actually delete the test account
- tapOn: "Cancel"

# Go back to home
- runFlow: shared/press-back.yaml
- assertVisible: "Upp"

# ============================================
# TEST FILTERS
# ============================================

# Open filters
- tapOn: "Open filters"

# Wait for filter modal
- extendedWaitUntil:
    visible: "Filters"
    timeout: 5000

# Toggle My Routes switch
- tapOn: "Toggle my routes filter"

# Search for something NOT in title/description
- tapOn: "Search by name or description"
- inputText: "xyznonexistent"

# Close filters
- hideKeyboard
- waitForAnimationToEnd

# Verify no routes shown (empty state or no matches)
- assertNotVisible: ".*E2E Test Route Updated.*"

# Tap on the search filter chip to remove it (keep My Routes filter)
- tapOn: "Clear search filter"
- waitForAnimationToEnd

# Verify route is now visible
- extendedWaitUntil:
    visible: ".*E2E Test Route Updated.*"
    timeout: 5000

# ============================================
# TEST GRADE FILTER
# ============================================

# Open filters
- tapOn: "Open filters"
- extendedWaitUntil:
    visible: "Filters"
    timeout: 5000

# Type matching grade (V3 matches our test route)
- tapOn: "Grade"
- inputText: "V3"

# Close filters
- hideKeyboard
- waitForAnimationToEnd

# Route should still be visible (it's V3)
- extendedWaitUntil:
    visible: ".*E2E Test Route Updated.*"
    timeout: 5000

# Reopen filters and change to non-matching grade
- tapOn: "Open filters"
- extendedWaitUntil:
    visible: "Filters"
    timeout: 5000
- tapOn: "Grade"
- eraseText: 5
- inputText: "V99"
- hideKeyboard
- waitForAnimationToEnd

# Route should NOT be visible
- assertNotVisible: ".*E2E Test Route Updated.*"

# Clear grade filter via chip
- tapOn: "Clear grade filter"
- waitForAnimationToEnd

# Route should be visible again
- extendedWaitUntil:
    visible: ".*E2E Test Route Updated.*"
    timeout: 5000

# ============================================
# TEST WALL STATUS FILTER
# ============================================

# Open filters
- tapOn: "Open filters"
- extendedWaitUntil:
    visible: "Filters"
    timeout: 5000

# Tap Past — route is on active wall, should not be visible
- tapOn: "Past"
- tapOn: "Done"
- waitForAnimationToEnd
- assertNotVisible: ".*E2E Test Route Updated.*"

# Open filters and tap All — route should be visible again
- tapOn: "Open filters"
- extendedWaitUntil:
    visible: "Filters"
    timeout: 5000
- tapOn: "All"
- tapOn: "Done"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*E2E Test Route Updated.*"
    timeout: 5000

# Leave wall status on "All" — will verify it persists across logout later

# ============================================
# DELETE THE TEST ROUTE
# ============================================

# Tap on the route to go to details
- tapOn: ".*E2E Test Route Updated.*"
- extendedWaitUntil:
    visible: "Route Details"
    timeout: 5000

# Scroll to and tap Edit Route
- scrollUntilVisible:
    element:
      text: "Edit Route.*"
    direction: DOWN
    timeout: 5000
- tapOn: "Edit Route.*"
- extendedWaitUntil:
    visible: "Edit Route"
    timeout: 5000

# Scroll to Delete button
- scrollUntilVisible:
    element: "Delete"
    direction: DOWN
    timeout: 5000

# Tap Delete
- tapOn: "Delete"

# Confirm deletion in alert
- extendedWaitUntil:
    visible: "Delete Route"
    timeout: 3000
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn: "Delete"
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          point: "68%,58%"

# Handle deleted alert
- extendedWaitUntil:
    visible: "Deleted"
    timeout: 5000
- tapOn: "OK"

# Should be redirected to home
- extendedWaitUntil:
    visible: "Upp"
    timeout: 5000

# My Routes filter should still be active, verify no routes
- assertVisible: "Clear my routes filter"
- assertVisible: "No routes yet"

# ============================================
# TEST LOGOUT PRESERVES PREFERENCES
# ============================================

# Wall status is already "All" from the filter test above.
# "My Routes" is active — logout should clear it (user-specific filter).

# Logout via profile menu
- runFlow: shared/menu-tap-logout.yaml

# Verify we're in guest state (Login button appears)
- extendedWaitUntil:
    visible: "Login"
    timeout: 5000

# Verify wall filter survived logout — "All" chip should still be visible
- assertVisible: "Clear wall filter"

# Verify "My Routes" was cleared (user-specific filter)
- assertNotVisible: "My Routes"

# Verify session is actually cleared — tap + and expect login screen
- tapOn: "+"
- extendedWaitUntil:
    visible: "Log In"
    timeout: 5000
- assertVisible: "Email"
- runFlow: shared/press-back.yaml

# Log back in (inline — cannot use auth-login.yaml because it runs clearState)
- tapOn: "Login"
- extendedWaitUntil:
    visible: "Log In"
    timeout: 5000
- tapOn: "Email"
- inputText: ${E2E_TEST_EMAIL}
- tapOn: "Password"
- inputText: ${E2E_TEST_PASSWORD}
- tapOn: "Log In"

# iOS may show "Save Password?" dialog — dismiss it
- runFlow:
    when:
      visible: "Save Password?"
    commands:
      - tapOn: "Not Now"

- extendedWaitUntil:
    visible: "Upp"
    timeout: 10000
- assertNotVisible: "Login"

# Verify wall filter still persisted after re-login
- assertVisible: "Clear wall filter"

# ============================================
# TEST COMPLETE
# ============================================
