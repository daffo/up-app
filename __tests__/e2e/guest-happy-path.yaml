appId: com.daffo.upapp
name: Guest User - Complete Happy Path
---
# ============================================
# GUEST USER HAPPY PATH
# Tests all auth-required actions redirect to login
# ============================================

# Setup
- runFlow: shared/setup.yaml

# --------------------------------------------
# 1. HOME SCREEN - VERIFY LOGGED OUT STATE
# --------------------------------------------
- assertVisible: "Upp"
- assertVisible: "Spray Wall Routes"
- assertVisible: "Login"

# Wait for routes to load
# iOS groups card content into one accessibility string e.g. "Title, , 5.0, 6c, desc, 3/23/2026, 🤚 29"
- extendedWaitUntil:
    visible: ".*[0-9]+/[0-9]+/[0-9]+.*"
    timeout: 15000

# --------------------------------------------
# 2. TAP LOGIN → SEE LOGIN PAGE → BACK
# --------------------------------------------
- tapOn: "Login"
- extendedWaitUntil:
    visible: "Log In"
    timeout: 5000
- assertVisible: "Email"
- assertVisible: "Password"
- runFlow: shared/press-back.yaml

# Should be back on home
- assertVisible: "Upp"
- assertVisible: "Login"

# --------------------------------------------
# 3. TAP CREATE ROUTE (+) → SEE LOGIN PAGE → BACK
# --------------------------------------------
- tapOn: "+"
- extendedWaitUntil:
    visible: "Log In"
    timeout: 5000
- assertVisible: "Email"
- runFlow: shared/press-back.yaml

# Should be back on home
- assertVisible: "Upp"

# --------------------------------------------
# 4. TAP ROUTE → TAP SEND → SEE LOGIN PAGE → BACK
# --------------------------------------------
# Tap on first route
- tapOn:
    text: ".*[0-9]+/[0-9]+/[0-9]+.*"
    index: 0

- assertVisible: "Route Details"

# Tap Send button (iOS accessibility text includes icon prefix: ", Send")
- tapOn: ".*Send"

# Should redirect to login
- extendedWaitUntil:
    visible: "Log In"
    timeout: 5000
- assertVisible: "Email"
- runFlow: shared/press-back.yaml

# Should be back on route detail
- assertVisible: "Route Details"

# Wait for route content to load
- extendedWaitUntil:
    visible: "Created by"
    timeout: 10000

# --------------------------------------------
# 5. WRITE COMMENT → TAP SEND → SEE LOGIN PAGE → BACK
# --------------------------------------------
# Scroll to comments
- scrollUntilVisible:
    element:
      text: "Comments.*"
    direction: DOWN
    timeout: 5000

# Scroll until input is visible (comments may push it off screen)
- scrollUntilVisible:
    element:
      text: "Add a comment.*"
    direction: DOWN
    timeout: 5000

# Type in comment input (same pattern as login fields)
- tapOn: "Add a comment.*"
- inputText: "test comment from guest"

# Tap send button
# On Android: keyboard up, button above keyboard at 90%,95%
# On iOS: hide keyboard first, button at bottom right of visible content
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          point: "90%, 95%"
- runFlow:
    when:
      platform: iOS
    commands:
      - hideKeyboard
      - scrollUntilVisible:
          element:
            text: "test comment from guest"
          direction: DOWN
          timeout: 5000
      - tapOn:
          point: "92%, 92%"

# Should redirect to login
- extendedWaitUntil:
    visible: "Log In"
    timeout: 5000
- assertVisible: "Email"
- runFlow: shared/press-back.yaml

# Should be back on route detail
- assertVisible: "Route Details"

# --------------------------------------------
# 6. BACK TO HOME
# --------------------------------------------
- runFlow: shared/press-back.yaml

# Should be on home screen, still logged out
- assertVisible: "Upp"
- assertVisible: "Spray Wall Routes"
- assertVisible: "Login"

# ============================================
# GUEST HAPPY PATH COMPLETE
# ============================================
