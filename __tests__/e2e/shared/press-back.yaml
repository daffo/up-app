appId: com.daffo.upapp
name: Cross-platform Back Navigation
---
# Android: use hardware back button
- runFlow:
    when:
      platform: Android
    commands:
      - pressKey: back

# iOS: swipe from left edge to go back (works on all screens, even headerless ones)
- runFlow:
    when:
      platform: iOS
    commands:
      - swipe:
          start: "1%,50%"
          end: "80%,50%"
