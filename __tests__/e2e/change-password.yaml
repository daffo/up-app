appId: com.daffo.upapp
name: Change Password - Security Flow
---
# ============================================
# CHANGE PASSWORD + FORCED LOGOUT (SEC-2/SEC-4)
# ============================================

# Setup and Login
- runFlow: auth-login.yaml

- assertVisible: "Upp"
- assertNotVisible: "Login"

# ============================================
# NAVIGATE TO CHANGE PASSWORD
# ============================================

# Open profile menu → Settings
- tapOn: "Open menu"
- extendedWaitUntil:
    visible: "Settings"
    timeout: 3000
- tapOn: "Settings"
- extendedWaitUntil:
    visible: "Change Password"
    timeout: 5000

# Tap Change Password
- tapOn: "Change Password"
- extendedWaitUntil:
    visible: "Current Password"
    timeout: 5000

# ============================================
# TEST: WRONG CURRENT PASSWORD → ERROR
# ============================================

- tapOn: "Current Password"
- inputText: "WrongPassword999"
- tapOn: "New Password"
- inputText: "NewPass123!"
- tapOn: "Confirm New Password"
- inputText: "NewPass123!"
- hideKeyboard

# Tap Update Password
- tapOn: "Update Password"

# Should see error alert
- extendedWaitUntil:
    visible: "Current password is incorrect"
    timeout: 10000
- tapOn: "OK"

# Still on Change Password screen
- assertVisible: "Current Password"

# ============================================
# TEST: SUCCESSFUL PASSWORD CHANGE → LOGOUT
# ============================================

# Clear fields and enter correct current password
- tapOn: "Current Password"
- eraseText: 30
- inputText: ${E2E_TEST_PASSWORD}
- tapOn: "New Password"
- eraseText: 30
- inputText: "TempPass456!"
- tapOn: "Confirm New Password"
- eraseText: 30
- inputText: "TempPass456!"
- hideKeyboard

# Tap Update Password
- tapOn: "Update Password"

# Should see success alert (SEC-4: forced logout)
- extendedWaitUntil:
    visible: "Password updated successfully"
    timeout: 10000
- tapOn: "OK"

# Should be redirected to Login screen (global signOut happened)
- extendedWaitUntil:
    visible: "Log In"
    timeout: 10000
- assertVisible: "Email"

# ============================================
# TEST: LOGIN WITH NEW PASSWORD
# ============================================

- tapOn: "Email"
- inputText: ${E2E_TEST_EMAIL}
- tapOn: "Password"
- inputText: "TempPass456!"
- tapOn: "Log In"

# Should be logged in
- extendedWaitUntil:
    visible: "Upp"
    timeout: 10000
- assertNotVisible: "Login"

# ============================================
# RESTORE ORIGINAL PASSWORD
# ============================================

# Navigate to Change Password again
- tapOn: "Open menu"
- extendedWaitUntil:
    visible: "Settings"
    timeout: 3000
- tapOn: "Settings"
- extendedWaitUntil:
    visible: "Change Password"
    timeout: 5000
- tapOn: "Change Password"
- extendedWaitUntil:
    visible: "Current Password"
    timeout: 5000

# Change back to original
- tapOn: "Current Password"
- inputText: "TempPass456!"
- tapOn: "New Password"
- inputText: ${E2E_TEST_PASSWORD}
- tapOn: "Confirm New Password"
- inputText: ${E2E_TEST_PASSWORD}
- hideKeyboard

- tapOn: "Update Password"

# Success → redirected to Login again
- extendedWaitUntil:
    visible: "Password updated successfully"
    timeout: 10000
- tapOn: "OK"
- extendedWaitUntil:
    visible: "Log In"
    timeout: 10000

# ============================================
# VERIFY ORIGINAL PASSWORD STILL WORKS
# ============================================

- tapOn: "Email"
- inputText: ${E2E_TEST_EMAIL}
- tapOn: "Password"
- inputText: ${E2E_TEST_PASSWORD}
- tapOn: "Log In"

- extendedWaitUntil:
    visible: "Upp"
    timeout: 10000
- assertNotVisible: "Login"

# ============================================
# TEST COMPLETE — password restored
# ============================================
