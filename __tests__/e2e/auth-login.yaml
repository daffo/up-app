appId: com.daffo.upapp
name: Auth - Login Flow
---
# Setup
- runFlow: shared/setup.yaml

# Should be on Home screen with Login button (logged out)
- assertVisible: "Upp"
- assertVisible: "Login"

# Go to login
- tapOn: "Login"
- assertVisible: "Log In"

# Enter credentials
- tapOn: "Email"
- inputText: ${E2E_TEST_EMAIL}
- tapOn: "Password"
- inputText: ${E2E_TEST_PASSWORD}

# Submit
- tapOn: "Log In"

# iOS may show "Save Password?" dialog — dismiss it
- runFlow:
    when:
      visible: "Save Password?"
    commands:
      - tapOn: "Not Now"

# Should be back on Home, logged in
- extendedWaitUntil:
    visible: "Upp"
    timeout: 10000

- assertNotVisible: "Login"
