appId: com.daffo.upapp
name: Test Setup
---
# Clear state and launch fresh
- clearState
- launchApp

# Dev client launcher - tap the dev server entry
- tapOn: ".*8081"

# Welcome modal — only appears on first launch with dev client
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"

# Dev tools sheet opens automatically on Android — disable floating button and dismiss
- runFlow:
    when:
      platform: Android
    commands:
      - extendedWaitUntil:
          visible: "Tools button"
          timeout: 10000
      - tapOn: "Tools button"
      - pressKey: back

# Wait for app Home screen
- extendedWaitUntil:
    visible: "Spray Wall Routes"
    timeout: 10000
